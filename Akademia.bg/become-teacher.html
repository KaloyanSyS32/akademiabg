<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стани учител | AkademiaBG</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
</head>
<body>

    <header class="navbar-layout theme-glass-nav">
        <a href="index.html" class="brand-wrapper-layout">
            <div class="logo-box-layout theme-logo-box">
                <img src="favico.png" alt="Лого" class="logo-img">
            </div>
            <span class="brand-text theme-brand-title">
                Akademia<span class="brand-accent">BG</span>
            </span>
        </a>
        <div class="nav-actions-layout">
            <a href="index.html" class="nav-link-secondary theme-text-accent-link">Начало</a>
        </div>
    </header>

    <main class="split-viewport-layout">
        <section class="form-side-layout">
            <div class="onboarding-container-box-layout">
                <h1 class="hero-title-layout theme-heading-text auth-heading-patch-layout">Стани учител</h1>
                <p class="theme-text-muted-paragraph onboarding-subtitle-patch-layout">Присъединете се към екипа от специалисти по БЕЛ.</p>
                
                <form id="teacher-onboarding-form" class="onboarding-form-flow-layout">
                    <div class="input-group-flow-layout">
                        <label for="teacher-name" class="badge-text theme-brand-title form-label-font-layout">Име и Фамилия</label>
                        <input type="text" id="teacher-name" class="input-field-layout theme-input" placeholder="Проф. Мария Петрова" required>
                    </div>

                    <div class="input-group-flow-layout">
                        <label for="teacher-subject" class="badge-text theme-brand-title form-label-font-layout">Специализация / Предмет</label>
                        <input type="text" id="teacher-subject" class="input-field-layout theme-input" value="Български език и Литература (БЕЛ)" readonly required>
                    </div>

                    <div class="input-group-flow-layout">
                        <label for="teacher-rate" class="badge-text theme-brand-title form-label-font-layout">Стандартно възнаграждение за урок</label>
                        <input type="text" id="teacher-rate" class="input-field-layout theme-input onboarding-rate-highlight-layout" value="40 лв. (€20) / учебен час" readonly required>
                    </div>

                    <div class="input-group-flow-layout">
                        <label class="badge-text theme-brand-title form-label-font-layout">Целеви групи / Класове</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" name="grades" value="5"> 5. клас</label>
                            <label class="checkbox-label"><input type="checkbox" name="grades" value="6"> 6. клас</label>
                            <label class="checkbox-label"><input type="checkbox" name="grades" value="7"> 7. клас (НВО)</label>
                            <label class="checkbox-label"><input type="checkbox" name="grades" value="11"> 11. клас</label>
                            <label class="checkbox-label"><input type="checkbox" name="grades" value="12"> 12. клас (ДЗИ)</label>
                            <label class="checkbox-label"><input type="checkbox" name="grades" value="Uni"> Университет</label>
                        </div>
                    </div>

                    <div class="input-group-flow-layout">
                        <label for="teacher-bio" class="badge-text theme-brand-title form-label-font-layout">Професионално резюме / Биография</label>
                        <textarea id="teacher-bio" class="input-field-layout theme-input onboarding-textarea-layout" placeholder="Разкажете за своя опит, педагогически подход и постигнати резултати..." required minlength="30"></textarea>
                    </div>

                    <p id="onboarding-error-msg" class="status-alert-layout theme-status-error"></p>
                    <p id="onboarding-success-msg" class="status-alert-layout theme-status-success"></p>

                    <button type="submit" id="onboarding-submit-btn" class="btn-primary-layout theme-btn-primary full-width-btn-layout">Изпрати кандидатстване</button>
                </form>
            </div>
        </section>

        <section class="brand-side-layout">
            <div class="badge-layout theme-glass-badge brand-badge-margin-layout">
                <span class="pulse-indicator-layout">
                    <span class="pulse-ring"></span>
                    <span class="pulse-dot"></span>
                </span>
                <span class="badge-text">Преподавателски панел</span>
            </div>
            <h2 class="hero-title-layout theme-heading-text brand-hero-title-layout">
                Фиксирано заплащане, <br>без скрити такси
            </h2>
            <p class="theme-text-muted-paragraph brand-hero-desc-layout">
                Всички индивидуални сесии в платформата се таксуват на единна фиксирана ставка от €20. Фокусирайте се изцяло върху преподаването.
            </p>
        </section>
    </main>

    <script type="module" src="./src/teacher-onboarding.js"></script>
</body>
</html>
