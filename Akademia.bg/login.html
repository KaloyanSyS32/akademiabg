<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация | AkademiaBG</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
</head>
<body>

    <header class="navbar-layout theme-glass-nav">
        <a href="index.html" class="brand-wrapper-layout">
            <div class="logo-box-layout theme-logo-box">
                <img src="favico.png" alt="Лого" class="logo-img">
            </div>
            <span class="brand-text theme-brand-title">
                Akademia<span class="brand-accent">BG</span>
            </span>
        </a>
        <div class="nav-actions-layout">
            <a href="index.html" class="nav-link-secondary theme-text-accent-link">Начало</a>
        </div>
    </header>

    <main class="split-viewport-layout">
        <section class="form-side-layout">
            <div class="auth-container-box-layout" id="auth-view-wrapper">
                <h1 id="auth-title" class="hero-title-layout theme-heading-text auth-heading-patch-layout">Вход</h1>
                <p id="auth-subtitle" class="theme-text-muted-paragraph auth-subtitle-patch-layout">Добре дошли отново! Влезте в профила си.</p>
                
                <form id="auth-form" class="auth-form-flow-layout">
                    <div id="name-field-group" class="input-group-flow-layout" data-state="hidden">
                        <label for="auth-name" class="badge-text theme-brand-title form-label-font-layout">Име и Фамилия</label>
                        <input type="text" id="auth-name" name="name" autocomplete="name" class="input-field-layout theme-input" placeholder="Иван Иванов">
                    </div>

                    <div class="input-group-flow-layout">
                        <label for="auth-email" class="badge-text theme-brand-title form-label-font-layout">Имейл адрес</label>
                        <input type="email" id="auth-email" name="email" autocomplete="username" class="input-field-layout theme-input" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group-flow-layout" id="password-field-group">
                        <div class="label-row-layout">
                            <label for="auth-password" class="badge-text theme-brand-title form-label-font-layout">Парола</label>
                            <a href="#" id="auth-forgot-link" class="nav-link-secondary theme-text-accent-link recovery-link-layout">Забравена парола?</a>
                        </div>
                        <input type="password" id="auth-password" name="password" autocomplete="current-password" class="input-field-layout theme-input" placeholder="••••••••" required minlength="6">
                    </div>

                    <p id="auth-error-msg" class="status-alert-layout theme-status-error"></p>
                    <p id="auth-success-msg" class="status-alert-layout theme-status-success"></p>

                    <button type="submit" id="auth-submit-btn" class="btn-primary-layout theme-btn-primary full-width-btn-layout">Влез в профила</button>
                </form>

                <div class="auth-footer-divider-layout theme-border-top-divider">
                    <p id="auth-toggle-msg" class="theme-text-muted-paragraph toggle-msg-font-layout">
                        Нямате профил? <a href="#" id="auth-toggle-link" class="theme-text-accent-link">Регистрирайте се тук</a>
                    </p>
                </div>
            </div>
        </section>

        <section class="brand-side-layout">
            <div class="badge-layout theme-glass-badge brand-badge-margin-layout">
                <span class="pulse-indicator-layout">
                    <span class="pulse-ring"></span>
                    <span class="pulse-dot"></span>
                </span>
                <span class="badge-text">Премиум обучение</span>
            </div>
            <h2 class="hero-title-layout theme-heading-text brand-hero-title-layout">
                Твоят дигитален <br>клас по БЕЛ
            </h2>
            <p class="theme-text-muted-paragraph brand-hero-desc-layout">
                Достъп до специализирани уроци, проследяване на графици и директна връзка с топ преподаватели в реално време.
            </p>
        </section>
    </main>

    <script type="module" src="./src/auth-handler.js"></script>
</body>
</html>
