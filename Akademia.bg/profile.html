<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профил на преподавател | AkademiaBG</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
</head>
<body>

    <header class="navbar-layout theme-glass-nav">
        <a href="index.html" class="brand-wrapper-layout">
            <div class="logo-box-layout theme-logo-box">
                <img src="favico.png" alt="Лого" class="logo-img">
            </div>
            <span class="brand-text theme-brand-title">
                Akademia<span class="brand-accent">BG</span>
            </span>
        </a>
        <div class="nav-actions-layout">
            <a href="catalog.html" class="nav-link-secondary theme-text-accent-link">Всички учители</a>
        </div>
    </header>

    <main class="page-main-layout">
        <div id="profile-loading-state" class="profile-loader-layout theme-skeleton-loader"></div>
        
        <div id="profile-root-wrapper" class="profile-page-grid-layout">
            <section class="card-layout theme-glass-card profile-bio-wrapper-layout">
                <div class="profile-header-strip-layout theme-border-bottom-divider">
                    <div class="logo-box-layout theme-logo-box profile-avatar-frame-layout theme-avatar-border">
                        <img id="view-avatar" src="" alt="Преподавател" class="profile-avatar-img-layout">
                    </div>
                    <div class="profile-headline-block-layout">
                        <h1 id="view-name" class="hero-title-layout theme-heading-text profile-header-title-layout">-</h1>
                        <span id="view-subject" class="badge-text theme-text-accent-link profile-subject-badge-layout">-</span>
                    </div>
                </div>

                <div class="profile-body-block-layout">
                    <h2 class="theme-heading-text profile-section-title-layout">Биография & Педагогически подход</h2>
                    <p id="view-bio" class="bio-text-area-layout theme-text-muted-paragraph">-</p>
                </div>
            </section>

            <aside class="profile-sidebar-wrapper-layout">
                <div class="card-layout theme-glass-card profile-meta-card-layout">
                    <h3 class="theme-heading-text profile-meta-title-layout">Условия на обучение</h3>
                    
                    <div class="meta-list-layout">
                        <div class="meta-item-layout theme-border-bottom-divider">
                            <span class="theme-text-muted-paragraph profile-meta-label-layout">Ставка за урок:</span>
                            <span id="view-rate" class="profile-rate-value-layout theme-text-accent-link">-</span>
                        </div>
                        <div class="meta-item-layout theme-border-bottom-divider">
                            <span class="theme-text-muted-paragraph profile-meta-label-layout">Подходящо за:</span>
                            <span id="view-grades" class="profile-grades-value-layout theme-indicator-text">-</span>
                        </div>
                    </div>

                    <button id="booking-trigger-btn" class="btn-primary-layout theme-btn-primary profile-booking-btn-layout">Запиши се за час</button>
                </div>
            </aside>
        </div>
    </main>

    <script type="module" src="./src/profile-loader.js"></script>
</body>
</html>
