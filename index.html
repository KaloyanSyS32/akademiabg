<!DOCTYPE html>
<html lang="bg">
<head>

    <title>AkademiaBG</title>

<body class="bg-slate-950 text-slate-200 selection:bg-blue-500/30">

<div class="max-w-6xl mx-auto px-6">

        <a href="index.html" class="flex items-center px-4 py-2 border border-slate-800 rounded-xl shadow-lg hover:border-blue-500/50 transition bg-slate-900/50 backdrop-blur-sm">

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="catalog.html" class="w-full sm:w-auto bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/40 hover:bg-blue-500 hover:-translate-y-1 transition-all">
                Намери учител
            </a>
            <a href="become-teacher.html" class="w-full sm:w-auto bg-slate-900 text-white border border-slate-800 px-10 py-4 rounded-2xl font-black text-lg hover:bg-slate-800 hover:border-slate-700 transition-all">

    </div>

<script src="js/index.js"></script>
