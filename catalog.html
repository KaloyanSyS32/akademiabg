<!DOCTYPE html>
<html lang="bg">

    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-slate-950 text-slate-300 selection:bg-blue-500/30">

    <section id="teachersContainer" class="grid grid-cols-1 gap-6 mb-20">
