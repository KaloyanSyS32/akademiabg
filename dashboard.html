<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учителски панел – AkademiaBG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <img src="favico.png" alt="AkademiaBG" class="h-10 w-10">
            <span class="font-bold text-xl tracking-tight">AkademiaBG <span class="text-blue-600">Panel</span></span>
        </div>
        <div class="flex items-center gap-6">
            <span id="user-name" class="font-medium text-gray-700">Зареждане...</span>
            <button id="logoutBtn" class="text-sm bg-red-50 text-red-600 px-4 py-2 rounded-lg hover:bg-red-100 transition">Изход</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto py-12 px-6">
        <header class="mb-10 text-center sm:text-left">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Добре дошли в личния си панел</h1>
            <p class="text-gray-500">Тук можете да управлявате своите уроци, ученици и профил.</p>
        </header>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-400 text-xs uppercase font-bold tracking-widest mb-1">Предстоящи уроци</h3>
                <p class="text-4xl font-black text-blue-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-400 text-xs uppercase font-bold tracking-widest mb-1">Активни ученици</h3>
                <p class="text-4xl font-black text-green-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-400 text-xs uppercase font-bold tracking-widest mb-1">Рейтинг</h3>
                <p class="text-4xl font-black text-yellow-500">5.0</p>
            </div>
        </div>

        <section class="mt-12 bg-blue-600 rounded-3xl p-10 text-white shadow-xl flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h2 class="text-2xl font-bold mb-2">Завършете своя профил</h2>
                <p class="text-blue-100">Добавете снимка и описание, за да започнете да получавате заявки от ученици.</p>
            </div>
            <button class="bg-white text-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-50 transition shadow-lg">Редактирай профил</button>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://nnigkcvvpggukwqeavuy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uaWdrY3Z2cGdndWt3cWVhdnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTEyNzMsImV4cCI6MjA5MTA2NzI3M30.xkyDbv_3Z3nflfp0t1pw6p5EMRJ0mNF3Rx3j49FHjDg";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAccess() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            // 1. Проверка дали има влязъл потребител
            if (!session) {
                window.location.href = "login.html";
                return;
            }

            // 2. Проверка дали потребителят е учител
            if (session.user.user_metadata.role !== 'teacher') {
                alert("Нямате достъп до тази страница. Ще бъдете пренасочени към каталога.");
                window.location.href = "catalog.html";
                return;
            }

            // 3. Показване на името
            document.getElementById("user-name").textContent = session.user.user_metadata.display_name || "Учител";
        }

        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        });

        checkAccess();
    </script>
</body>
</html>
