<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход – AkademiaBG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-300 flex items-center justify-center min-h-screen p-6">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block mb-4"><img src="favico.png" class="h-16 w-16 mx-auto"></a>
            <h1 class="text-2xl font-black text-white tracking-tight">Влез в AkademiaBG</h1>
            <p class="text-slate-500 text-sm mt-1">Вход за ученици</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block mb-1.5 text-xs font-bold text-slate-500 uppercase tracking-widest">Потребителско име</label>
                <input id="username" type="text" class="w-full bg-slate-950 border border-slate-800 text-white p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Твоето име">
            </div>
            <div>
                <label class="block mb-1.5 text-xs font-bold text-slate-500 uppercase tracking-widest">Имейл</label>
                <input id="email" type="email" class="w-full bg-slate-950 border border-slate-800 text-white p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="email@example.com">
            </div>
            <div>
                <label class="block mb-1.5 text-xs font-bold text-slate-500 uppercase tracking-widest">Парола</label>
                <input id="password" type="password" class="w-full bg-slate-950 border border-slate-800 text-white p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="********">
            </div>
            <div class="flex flex-col gap-3 pt-4">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black hover:bg-blue-500 transition">ВХОД</button>
                <button id="signupBtn" class="w-full bg-slate-800 text-white py-3 rounded-xl font-black border border-slate-700 hover:bg-slate-700 transition">РЕГИСТРАЦИЯ</button>
            </div>
        </div>
        <p id="message" class="mt-6 text-sm text-center font-medium min-h-[20px]"></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>
</html>
